# Sunshine — staged alongside live lm-stack. Models/secrets via .env (gitignored).
services:
  memory:
    build: ./organs/memory
    image: sunshine-memory:0.1
    container_name: sun-memory
    restart: unless-stopped
    ports: ["0.0.0.0:8090:8000"]
    mem_limit: 4g
    volumes:
      - ./organs/memory/data:/data                                   # native (writable) namespaces
      - /srv/nvme-data/containers/live/lm-stack/reason-engine/methods:/legacy:ro  # existing indexes (read)
    environment:
      EMBED_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
      WORKER_URL: "http://127.0.0.1:8071/v1/chat/completions"        # validated Qwen3.5-0.8b worker (distill-on-write)

  fast:
    build: ./organs/fast
    image: sunshine-fast:0.1
    container_name: sun-fast
    restart: unless-stopped
    network_mode: host                  # reach the worker on 127.0.0.1:8071
    environment:
      WORKER_URL: "http://127.0.0.1:8071/v1/chat/completions"
      WORKER_MODEL: "qwen3.5-0.8b"
    command: ["uvicorn","app:app","--host","0.0.0.0","--port","8091"]

  reason:
    build: ./organs/reason
    image: sunshine-reason:0.1
    container_name: sun-reason
    restart: unless-stopped
    network_mode: host                  # reach main :8072 and memory :8090
    environment:
      MAIN_URL: "http://127.0.0.1:8072/v1/chat/completions"
      MAIN_MODEL: "qwen3.5-4b"
      MEMORY_URL: "http://127.0.0.1:8090"
    command: ["uvicorn","app:app","--host","0.0.0.0","--port","8092"]

  verify:
    build: ./organs/verify
    image: sunshine-verify:0.1
    container_name: sun-verify
    restart: unless-stopped
    network_mode: host                  # reach wasm-sandbox (172.30.0.2) + main :8072
    environment:
      SANDBOX_URL: "http://172.30.0.2:8000/run"
      MAIN_URL: "http://127.0.0.1:8072/v1/chat/completions"
      MAIN_MODEL: "qwen3.5-4b"
    command: ["uvicorn","app:app","--host","0.0.0.0","--port","8093"]

  kernel:
    build: ./organs/kernel
    image: sunshine-kernel:0.1
    container_name: sun-kernel
    restart: unless-stopped
    network_mode: host                  # compose the organs on 127.0.0.1
    environment:
      MEMORY_URL: "http://127.0.0.1:8090"
      FAST_URL: "http://127.0.0.1:8091"
      REASON_URL: "http://127.0.0.1:8092"
      VERIFY_URL: "http://127.0.0.1:8093"
    command: ["uvicorn","app:app","--host","0.0.0.0","--port","8094"]

  agent:
    build: ./frontends/agent
    image: sunshine-agent:0.1
    container_name: sun-agent
    restart: unless-stopped
    network_mode: host
    environment:
      KERNEL_URL: "http://127.0.0.1:8094"
      PORT: "8095"
      AGENT_EFFORT: "terse"

  shaper:
    build: ./organs/shaper
    image: sunshine-shaper:0.1
    container_name: sun-shaper
    restart: unless-stopped
    network_mode: host
    environment:
      MAIN_URL: "http://127.0.0.1:8072/v1/chat/completions"
      MAIN_MODEL: "qwen3.5-4b"
    command: ["uvicorn","app:app","--host","0.0.0.0","--port","8096"]

  backend:
    build: ./frontends/backend
    image: sunshine-backend:0.1
    container_name: sun-backend
    restart: unless-stopped
    network_mode: host
    environment:
      MAIN_URL: "http://127.0.0.1:8072/v1/chat/completions"
      MAIN_MODEL: "qwen3.5-4b"
      MODEL_ID: "sunshine"
      SUN_REASON_NS: "swe-faceted,agent-traces,recipes"
      SUN_FACET: "on"
      SUN_SEMANTIC_LD: "off"
      SUN_DIRECTIVE_RECALL: "on"
      SUN_RECALL_MINSIM: "0.62"
    command: ["uvicorn","app:app","--host","0.0.0.0","--port","8073"]
